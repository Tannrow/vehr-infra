name: Apply – Staging

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/apply-staging.yml'
  workflow_dispatch:
    inputs:
      ui_image_tag:
        description: 'UI image tag to deploy (leave blank to keep current)'
        required: false
        default: ''
      backend_image_tag:
        description: 'Backend image tag to deploy (leave blank to keep current)'
        required: false
        default: ''
  repository_dispatch:
    types: [deploy-staging]

permissions:
  contents: read

jobs:
  apply:
    name: Bicep Apply (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve staging secret inputs
        id: staging-secrets
        env:
          AZURE_RESOURCE_GROUP_STAGING: ${{ vars.AZURE_RESOURCE_GROUP_STAGING }}
          BACKEND_APP_NAME_STAGING: ${{ vars.BACKEND_APP_NAME_STAGING }}
          KEY_VAULT_NAME_STAGING: ${{ vars.KEY_VAULT_NAME_STAGING }}
          MANAGED_IDENTITY_RESOURCE_ID_STAGING: ${{ vars.MANAGED_IDENTITY_RESOURCE_ID_STAGING }}
        run: |
          set -euo pipefail

          RG="${AZURE_RESOURCE_GROUP_STAGING}"
          BACKEND_APP_NAME="${BACKEND_APP_NAME_STAGING:-vehr-api-staging}"
          KEY_VAULT_NAME="${KEY_VAULT_NAME_STAGING:-}"
          MANAGED_IDENTITY_RESOURCE_ID="${MANAGED_IDENTITY_RESOURCE_ID_STAGING:-}"

          if [ -z "$KEY_VAULT_NAME" ]; then
            KEY_VAULT_URL=$(az containerapp show \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RG" \
              --query "properties.configuration.secrets[?name=='db-connection-string'].keyVaultUrl | [0]" \
              --output tsv 2>/dev/null || true)
            if [ -n "$KEY_VAULT_URL" ] && [ "$KEY_VAULT_URL" != "null" ]; then
              KEY_VAULT_NAME="${KEY_VAULT_URL#https://}"
              KEY_VAULT_NAME="${KEY_VAULT_NAME%%.vault.azure.net*}"
            fi
          fi

          if [ -z "$MANAGED_IDENTITY_RESOURCE_ID" ]; then
            MANAGED_IDENTITY_RESOURCE_ID=$(az containerapp show \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RG" \
              --query "keys(identity.userAssignedIdentities) | [0]" \
              --output tsv 2>/dev/null || true)
            if [ "$MANAGED_IDENTITY_RESOURCE_ID" = "null" ]; then
              MANAGED_IDENTITY_RESOURCE_ID=''
            fi
          fi

          if [ -z "$KEY_VAULT_NAME" ]; then
            KEY_VAULT_NAME=$(az keyvault list \
              --resource-group "$RG" \
              --query "[0].name" \
              --output tsv 2>/dev/null || true)
            if [ "$KEY_VAULT_NAME" = "null" ]; then
              KEY_VAULT_NAME=''
            fi
          fi

          if [ -z "$MANAGED_IDENTITY_RESOURCE_ID" ]; then
            MANAGED_IDENTITY_RESOURCE_ID=$(az identity list \
              --resource-group "$RG" \
              --query "[0].id" \
              --output tsv 2>/dev/null || true)
            if [ "$MANAGED_IDENTITY_RESOURCE_ID" = "null" ]; then
              MANAGED_IDENTITY_RESOURCE_ID=''
            fi
          fi

          : "${KEY_VAULT_NAME:?Could not resolve KEY_VAULT_NAME_STAGING from workflow variables or existing staging resources}"
          : "${MANAGED_IDENTITY_RESOURCE_ID:?Could not resolve MANAGED_IDENTITY_RESOURCE_ID_STAGING from workflow variables or existing staging resources}"

          echo "key_vault_name=${KEY_VAULT_NAME}" >> "$GITHUB_OUTPUT"
          echo "managed_identity_resource_id=${MANAGED_IDENTITY_RESOURCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        env:
          ACR_SERVER: ${{ vars.ACR_LOGIN_SERVER_STAGING }}
          UI_IMAGE_REPOSITORY_STAGING: ${{ vars.UI_IMAGE_REPOSITORY_STAGING }}
          BACKEND_IMAGE_REPOSITORY_STAGING: ${{ vars.BACKEND_IMAGE_REPOSITORY_STAGING }}
        run: |
          set -euo pipefail

          UI_REPO="${UI_IMAGE_REPOSITORY_STAGING:-vehr-revenue-ui}"
          BACKEND_REPO="${BACKEND_IMAGE_REPOSITORY_STAGING:-vehr}"

          UI_TAG="${{ github.event.inputs.ui_image_tag || github.event.client_payload.ui_image_tag || 'latest' }}"
          BACKEND_TAG="${{ github.event.inputs.backend_image_tag || github.event.client_payload.backend_image_tag || 'latest' }}"

          echo "ui_image=${ACR_SERVER}/${UI_REPO}:${UI_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${ACR_SERVER}/${BACKEND_REPO}:${BACKEND_TAG}" >> "$GITHUB_OUTPUT"

      - name: Bicep Deploy
        uses: azure/cli@v2
        env:
          KEY_VAULT_NAME_STAGING: ${{ steps.staging-secrets.outputs.key_vault_name }}
          MANAGED_IDENTITY_RESOURCE_ID_STAGING: ${{ steps.staging-secrets.outputs.managed_identity_resource_id }}
        with:
          azcliversion: latest
          inlineScript: |
            set -euxo pipefail

            echo "Resource group: ${{ vars.AZURE_RESOURCE_GROUP_STAGING }}"
            echo "Template file: infra/main.bicep"
            echo "Parameters file: infra/parameters/staging.bicepparam"
            echo "UI image: ${{ steps.tags.outputs.ui_image }}"
            echo "Backend image: ${{ steps.tags.outputs.backend_image }}"

            az deployment group validate \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --template-file infra/main.bicep \
              --parameters infra/parameters/staging.bicepparam \
              --parameters uiImage="${{ steps.tags.outputs.ui_image }}" \
              --parameters backendImage="${{ steps.tags.outputs.backend_image }}" \
              --output jsonc

            az deployment group create \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --template-file infra/main.bicep \
              --parameters infra/parameters/staging.bicepparam \
              --parameters uiImage="${{ steps.tags.outputs.ui_image }}" \
              --parameters backendImage="${{ steps.tags.outputs.backend_image }}" \
              --mode Incremental \
              --name "deploy-staging-${{ github.run_number }}" \
              --output jsonc

      - name: Capture deployment outputs
        id: deployment
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euxo pipefail

            UI_FQDN=$(az deployment group show \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --name "deploy-staging-${{ github.run_number }}" \
              --query "properties.outputs.uiFqdn.value" \
              --output tsv)

            BACKEND_FQDN=$(az deployment group show \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --name "deploy-staging-${{ github.run_number }}" \
              --query "properties.outputs.backendFqdn.value" \
              --output tsv)

            echo "ui_fqdn=${UI_FQDN}" >> "$GITHUB_OUTPUT"
            echo "backend_fqdn=${BACKEND_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Health check – UI
        run: |
          set -euo pipefail
          FQDN="${{ steps.deployment.outputs.ui_fqdn }}"
          if [ -z "$FQDN" ]; then
            echo "::error::No UI FQDN returned from deployment outputs."
            exit 1
          fi

          URL="https://${FQDN}/api/health"
          echo "Checking ${URL}..."

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /tmp/ui-health.txt -w '%{http_code}' --max-time 20 "$URL" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "UI is healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::UI health check failed."
          cat /tmp/ui-health.txt || true
          exit 1

      - name: Health check – Backend
        run: |
          set -euo pipefail
          FQDN="${{ steps.deployment.outputs.backend_fqdn }}"
          if [ -z "$FQDN" ]; then
            echo "::error::No backend FQDN returned from deployment outputs."
            exit 1
          fi

          URL="https://${FQDN}/api/v1/health"
          echo "Checking ${URL}..."

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /tmp/backend-health.txt -w '%{http_code}' --max-time 20 "$URL" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::Backend health check failed."
          cat /tmp/backend-health.txt || true
          exit 1

      - name: Summary
        run: |
          {
            echo "## Staging deployment complete"
            echo
            echo "| App | URL |"
            echo "| --- | --- |"
            echo "| UI | https://${{ steps.deployment.outputs.ui_fqdn }} |"
            echo "| Backend | https://${{ steps.deployment.outputs.backend_fqdn }} |"
            echo
            echo "Images deployed:"
            echo "- UI: \`${{ steps.tags.outputs.ui_image }}\`"
            echo "- Backend: \`${{ steps.tags.outputs.backend_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
