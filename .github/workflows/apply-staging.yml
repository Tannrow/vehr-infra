name: Apply – Staging

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/apply-staging.yml'
  workflow_dispatch:
    inputs:
      ui_image_tag:
        description: 'UI image tag to deploy (leave blank to keep current)'
        required: false
        default: ''
      backend_image_tag:
        description: 'Backend image tag to deploy (leave blank to keep current)'
        required: false
        default: ''
      control_tower_image_tag:
        description: 'Control Tower image tag to deploy (leave blank to skip Control Tower deployment)'
        required: false
        default: ''
  repository_dispatch:
    types: [deploy-staging]

permissions:
  contents: read

jobs:
  apply:
    name: Bicep Apply (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve staging runtime config
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            KEY_VAULT_NAME="${{ vars.KEY_VAULT_NAME_STAGING }}"
            MANAGED_IDENTITY_RESOURCE_ID="${{ vars.MANAGED_IDENTITY_RESOURCE_ID_STAGING }}"
            RESOURCE_GROUP="${{ vars.AZURE_RESOURCE_GROUP_STAGING }}"
            TARGET_BACKEND_APP="${{ vars.BACKEND_APP_NAME_STAGING || 'vehr-revos-staging-eastus2' }}"
            LEGACY_BACKEND_APP="${{ vars.LEGACY_BACKEND_APP_NAME_STAGING || 'vehr-revos-staging-eus2' }}"
            BACKEND_APP="$TARGET_BACKEND_APP"

            if ! az containerapp show --name "$BACKEND_APP" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
              BACKEND_APP="$LEGACY_BACKEND_APP"
            fi

            if [ -z "$MANAGED_IDENTITY_RESOURCE_ID" ]; then
              APP_IDENTITY=$(az containerapp show \
                --name "$BACKEND_APP" \
                --resource-group "$RESOURCE_GROUP" \
                --query "join(',', keys(identity.userAssignedIdentities))" \
                --output tsv 2>/dev/null || true)
              MANAGED_IDENTITY_RESOURCE_ID="${APP_IDENTITY%%,*}"
            fi

            if [ -z "$MANAGED_IDENTITY_RESOURCE_ID" ]; then
              MANAGED_IDENTITY_RESOURCE_ID=$(az identity list --resource-group "$RESOURCE_GROUP" --query "[0].id" --output tsv 2>/dev/null || true)
            fi

            if [ -z "$KEY_VAULT_NAME" ]; then
              KEY_VAULT_URL=$(az containerapp show \
                --name "$BACKEND_APP" \
                --resource-group "$RESOURCE_GROUP" \
                --query "properties.configuration.secrets[?keyVaultUrl!=null][0].keyVaultUrl" \
                --output tsv 2>/dev/null || true)
              if [ -n "$KEY_VAULT_URL" ]; then
                KEY_VAULT_NAME=$(printf '%s' "$KEY_VAULT_URL" | sed -E 's#https://([^./]+).*#\\1#')
              fi
            fi

            if [ -z "$KEY_VAULT_NAME" ]; then
              KEY_VAULT_NAME=$(az keyvault list --resource-group "$RESOURCE_GROUP" --query "[0].name" --output tsv 2>/dev/null || true)
            fi

            {
              echo "KEY_VAULT_NAME_STAGING=${KEY_VAULT_NAME}"
              echo "MANAGED_IDENTITY_RESOURCE_ID_STAGING=${MANAGED_IDENTITY_RESOURCE_ID}"
            } >> "$GITHUB_ENV"

      - name: Preflight staging infrastructure summary
        run: |
          set -euo pipefail
          PARAM_FILE="infra/parameters/staging.bicepparam"

          read_string_param() {
            sed -nE "s/^param $1 = '(.*)'$/\\1/p" "$PARAM_FILE"
          }

          read_bool_param() {
            sed -nE "s/^param $1 = (true|false)$/\\1/p" "$PARAM_FILE"
          }

          LOCATION="$(read_string_param location)"
          ENV_NAME="$(read_string_param containerAppsEnvName)"
          ENV_MODE="$(read_bool_param containerAppsEnvExists)"
          ACR_NAME="$(read_string_param acrName)"
          ACR_MODE="$(read_bool_param acrExists)"
          LOG_ANALYTICS_NAME="$(read_string_param logAnalyticsWorkspaceName)"
          LOG_ANALYTICS_MODE="$(read_bool_param logAnalyticsWorkspaceExists)"

          echo "Effective staging region: ${LOCATION}"
          echo "Container Apps environment name: ${ENV_NAME}"
          echo "Container Apps environment action: $([ "$ENV_MODE" = "true" ] && echo 'reference existing' || echo 'create new')"
          echo "ACR resource name: ${ACR_NAME}"
          echo "ACR action: $([ "$ACR_MODE" = "true" ] && echo 'reference existing' || echo 'create new')"
          echo "Log Analytics resource name: ${LOG_ANALYTICS_NAME}"
          echo "Log Analytics action: $([ "$LOG_ANALYTICS_MODE" = "true" ] && echo 'reference existing' || echo 'create new')"

      - name: Resolve image tags
        id: tags
        env:
          ACR_SERVER: ${{ vars.ACR_LOGIN_SERVER_STAGING }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_STAGING }}
          UI_APP_NAME: ${{ vars.UI_APP_NAME_STAGING || 'vehr-revenue-ui-staging-eastus2' }}
          BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME_STAGING || 'vehr-revos-staging-eastus2' }}
          LEGACY_UI_APP_NAME: ${{ vars.LEGACY_UI_APP_NAME_STAGING || 'vehr-revenue-ui-staging-eus2' }}
          LEGACY_BACKEND_APP_NAME: ${{ vars.LEGACY_BACKEND_APP_NAME_STAGING || 'vehr-revos-staging-eus2' }}
          UI_IMAGE_REPOSITORY_STAGING: ${{ vars.UI_IMAGE_REPOSITORY_STAGING }}
          BACKEND_IMAGE_REPOSITORY_STAGING: ${{ vars.BACKEND_IMAGE_REPOSITORY_STAGING }}
          CONTROL_TOWER_IMAGE_REPOSITORY_STAGING: ${{ vars.CONTROL_TOWER_IMAGE_REPOSITORY_STAGING }}
        run: |
          set -euo pipefail

          UI_REPO="${UI_IMAGE_REPOSITORY_STAGING:-vehr-revenue-ui}"
          BACKEND_REPO="${BACKEND_IMAGE_REPOSITORY_STAGING:-vehr}"
          CONTROL_TOWER_REPO="${CONTROL_TOWER_IMAGE_REPOSITORY_STAGING:-control-tower}"

          UI_TAG="${{ github.event.inputs.ui_image_tag || github.event.client_payload.ui_image_tag || '' }}"
          BACKEND_TAG="${{ github.event.inputs.backend_image_tag || github.event.client_payload.backend_image_tag || '' }}"
          CONTROL_TOWER_TAG="${{ github.event.inputs.control_tower_image_tag || github.event.client_payload.control_tower_image_tag || '' }}"

          resolve_live_image() {
            local image
            local app_name

            for app_name in "$@"; do
              image=$(az containerapp show \
                --name "$app_name" \
                --resource-group "$RESOURCE_GROUP" \
                --query "properties.template.containers[?name=='$app_name'] | [0].image" \
                --output tsv 2>/dev/null || true)

              if [ -z "$image" ]; then
                image=$(az containerapp show \
                  --name "$app_name" \
                  --resource-group "$RESOURCE_GROUP" \
                  --query "properties.template.containers[0].image" \
                  --output tsv 2>/dev/null || true)
              fi

              if [ -n "$image" ]; then
                printf '%s' "$image"
                return 0
              fi
            done

            printf 'Unable to resolve a deployed image from Container Apps: %s\n' "$*" >&2
            return 1
          }

          if [ -n "$UI_TAG" ]; then
            UI_IMAGE="${ACR_SERVER}/${UI_REPO}:${UI_TAG}"
          else
            if ! UI_IMAGE="$(resolve_live_image "$UI_APP_NAME" "$LEGACY_UI_APP_NAME")"; then
              UI_IMAGE=""
            fi
          fi

          if [ -n "$BACKEND_TAG" ]; then
            BACKEND_IMAGE="${ACR_SERVER}/${BACKEND_REPO}:${BACKEND_TAG}"
          else
            if ! BACKEND_IMAGE="$(resolve_live_image "$BACKEND_APP_NAME" "$LEGACY_BACKEND_APP_NAME")"; then
              BACKEND_IMAGE=""
            fi
          fi

          if [ -z "$UI_IMAGE" ]; then
            echo "::error::Unable to resolve the staging UI image. Provide ui_image_tag explicitly or ensure Container App ${UI_APP_NAME} exists in ${RESOURCE_GROUP} with a deployed image."
            exit 1
          fi

          if [ -z "$BACKEND_IMAGE" ]; then
            echo "::error::Unable to resolve the staging backend image. Provide backend_image_tag explicitly or ensure Container App ${BACKEND_APP_NAME} exists in ${RESOURCE_GROUP} with a deployed image."
            exit 1
          fi

          echo "ui_app_name=${UI_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "backend_app_name=${BACKEND_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "ui_image=${UI_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          if [ -n "$CONTROL_TOWER_TAG" ]; then
            echo "control_tower_image=${ACR_SERVER}/${CONTROL_TOWER_REPO}:${CONTROL_TOWER_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "control_tower_image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate resolved staging deployment inputs
        run: |
          echo "Resolved UI app name: ${{ steps.tags.outputs.ui_app_name }}"
          echo "Resolved backend app name: ${{ steps.tags.outputs.backend_app_name }}"
          echo "Resolved UI image: ${{ steps.tags.outputs.ui_image }}"
          echo "Resolved backend image: ${{ steps.tags.outputs.backend_image }}"

      - name: Bicep Deploy
        uses: azure/cli@v2
        env:
          KEY_VAULT_NAME_STAGING: ${{ env.KEY_VAULT_NAME_STAGING }}
          MANAGED_IDENTITY_RESOURCE_ID_STAGING: ${{ env.MANAGED_IDENTITY_RESOURCE_ID_STAGING }}
        with:
          azcliversion: latest
          inlineScript: |
            set -euxo pipefail

            echo "Resource group: ${{ vars.AZURE_RESOURCE_GROUP_STAGING }}"
            echo "Template file: infra/main.bicep"
            echo "Parameters file: infra/parameters/staging.bicepparam"
            echo "UI image: ${{ steps.tags.outputs.ui_image }}"
            echo "Backend image: ${{ steps.tags.outputs.backend_image }}"
            echo "Control Tower image: ${{ steps.tags.outputs.control_tower_image || 'skipped' }}"

            az deployment group validate \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --template-file infra/main.bicep \
              --parameters infra/parameters/staging.bicepparam \
              --parameters uiImage="${{ steps.tags.outputs.ui_image }}" \
              --parameters backendImage="${{ steps.tags.outputs.backend_image }}" \
              --parameters controlTowerImage="${{ steps.tags.outputs.control_tower_image }}" \
              --output jsonc

            az deployment group create \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --template-file infra/main.bicep \
              --parameters infra/parameters/staging.bicepparam \
              --parameters uiImage="${{ steps.tags.outputs.ui_image }}" \
              --parameters backendImage="${{ steps.tags.outputs.backend_image }}" \
              --parameters controlTowerImage="${{ steps.tags.outputs.control_tower_image }}" \
              --mode Incremental \
              --name "deploy-staging-${{ github.run_number }}" \
              --output jsonc

      - name: Capture deployment outputs
        id: deployment
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euxo pipefail

            UI_FQDN=$(az deployment group show \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --name "deploy-staging-${{ github.run_number }}" \
              --query "properties.outputs.uiFqdn.value" \
              --output tsv)

            BACKEND_FQDN=$(az deployment group show \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --name "deploy-staging-${{ github.run_number }}" \
              --query "properties.outputs.backendFqdn.value" \
              --output tsv)

            CONTROL_TOWER_FQDN=$(az deployment group show \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --name "deploy-staging-${{ github.run_number }}" \
              --query "properties.outputs.controlTowerFqdn.value" \
              --output tsv)

            echo "ui_fqdn=${UI_FQDN}" >> "$GITHUB_OUTPUT"
            echo "backend_fqdn=${BACKEND_FQDN}" >> "$GITHUB_OUTPUT"
            echo "control_tower_fqdn=${CONTROL_TOWER_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Health check – UI
        run: |
          set -euo pipefail
          FQDN="${{ steps.deployment.outputs.ui_fqdn }}"
          if [ -z "$FQDN" ]; then
            echo "::error::No UI FQDN returned from deployment outputs."
            exit 1
          fi

          URL="https://${FQDN}/api/health"
          echo "Checking ${URL}..."

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /tmp/ui-health.txt -w '%{http_code}' --max-time 20 "$URL" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "UI is healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::UI health check failed."
          cat /tmp/ui-health.txt || true
          exit 1

      - name: Health check – Backend
        run: |
          set -euo pipefail
          FQDN="${{ steps.deployment.outputs.backend_fqdn }}"
          if [ -z "$FQDN" ]; then
            echo "::error::No backend FQDN returned from deployment outputs."
            exit 1
          fi

          URL="https://${FQDN}/api/v1/health"
          echo "Checking ${URL}..."

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /tmp/backend-health.txt -w '%{http_code}' --max-time 20 "$URL" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::Backend health check failed."
          cat /tmp/backend-health.txt || true
          exit 1

      - name: Health check – Control Tower
        if: steps.deployment.outputs.control_tower_fqdn != ''
        run: |
          set -euo pipefail
          FQDN="${{ steps.deployment.outputs.control_tower_fqdn }}"
          URL="https://${FQDN}/api/health"
          echo "Checking ${URL}..."

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /tmp/control-tower-health.txt -w '%{http_code}' --max-time 20 "$URL" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Control Tower is healthy."
              exit 0
            fi
            sleep 10
          done

          echo "::error::Control Tower health check failed."
          cat /tmp/control-tower-health.txt || true
          exit 1

      - name: Summary
        run: |
          {
            echo "## Staging deployment complete"
            echo
            echo "| App | URL |"
            echo "| --- | --- |"
            echo "| UI | https://${{ steps.deployment.outputs.ui_fqdn }} |"
            echo "| Backend | https://${{ steps.deployment.outputs.backend_fqdn }} |"
            if [ -n "${{ steps.deployment.outputs.control_tower_fqdn }}" ]; then
              echo "| Control Tower | https://${{ steps.deployment.outputs.control_tower_fqdn }} |"
            fi
            echo
            echo "Images deployed:"
            echo "- UI: \`${{ steps.tags.outputs.ui_image }}\`"
            echo "- Backend: \`${{ steps.tags.outputs.backend_image }}\`"
            if [ -n "${{ steps.tags.outputs.control_tower_image }}" ]; then
              echo "- Control Tower: \`${{ steps.tags.outputs.control_tower_image }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
