# plan-staging.yml
# Runs `az deployment group what-if` against the staging parameter file so that
# reviewers can see exactly what Bicep changes will be applied before merging.
#
# Triggers:
#   - On every PR that touches infra/** or workflow files
#   - On manual dispatch

name: Plan – Staging

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/plan-staging.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # allows posting what-if output as a PR comment

jobs:
  plan:
    name: Bicep What-If (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve staging runtime config
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            KEY_VAULT_NAME="${{ vars.KEY_VAULT_NAME_STAGING }}"
            MANAGED_IDENTITY_RESOURCE_ID="${{ vars.MANAGED_IDENTITY_RESOURCE_ID_STAGING }}"
            RESOURCE_GROUP="${{ vars.AZURE_RESOURCE_GROUP_STAGING }}"
            BACKEND_APP="${{ vars.BACKEND_APP_NAME_STAGING || 'vehr-revos-staging-eus2' }}"

            if [ -z "$MANAGED_IDENTITY_RESOURCE_ID" ]; then
              APP_IDENTITY=$(az containerapp show \
                --name "$BACKEND_APP" \
                --resource-group "$RESOURCE_GROUP" \
                --query "join(',', keys(identity.userAssignedIdentities))" \
                --output tsv 2>/dev/null || true)
              MANAGED_IDENTITY_RESOURCE_ID="${APP_IDENTITY%%,*}"
            fi

            if [ -z "$MANAGED_IDENTITY_RESOURCE_ID" ]; then
              MANAGED_IDENTITY_RESOURCE_ID=$(az identity list --resource-group "$RESOURCE_GROUP" --query "[0].id" --output tsv 2>/dev/null || true)
            fi

            if [ -z "$KEY_VAULT_NAME" ]; then
              KEY_VAULT_URL=$(az containerapp show \
                --name "$BACKEND_APP" \
                --resource-group "$RESOURCE_GROUP" \
                --query "properties.configuration.secrets[?keyVaultUrl!=null][0].keyVaultUrl" \
                --output tsv 2>/dev/null || true)
              if [ -n "$KEY_VAULT_URL" ]; then
                KEY_VAULT_NAME=$(printf '%s' "$KEY_VAULT_URL" | sed -E 's#https://([^./]+).*#\\1#')
              fi
            fi

            if [ -z "$KEY_VAULT_NAME" ]; then
              KEY_VAULT_NAME=$(az keyvault list --resource-group "$RESOURCE_GROUP" --query "[0].name" --output tsv 2>/dev/null || true)
            fi

            {
              echo "KEY_VAULT_NAME_STAGING=${KEY_VAULT_NAME}"
              echo "MANAGED_IDENTITY_RESOURCE_ID_STAGING=${MANAGED_IDENTITY_RESOURCE_ID}"
            } >> "$GITHUB_ENV"

      - name: Bicep What-If
        id: whatif
        uses: azure/cli@v2
        env:
          KEY_VAULT_NAME_STAGING: ${{ env.KEY_VAULT_NAME_STAGING }}
          MANAGED_IDENTITY_RESOURCE_ID_STAGING: ${{ env.MANAGED_IDENTITY_RESOURCE_ID_STAGING }}
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            RESULT=$(az deployment group what-if \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" \
              --template-file infra/main.bicep \
              --parameters infra/parameters/staging.bicepparam \
              --no-pretty-print \
              --output json 2>&1 || true)
            echo "whatif_output<<EOF" >> "$GITHUB_OUTPUT"
            echo "$RESULT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post What-If as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### 🔍 Bicep What-If — Staging

            <details><summary>Expand diff</summary>

            \`\`\`
            ${{ steps.whatif.outputs.whatif_output }}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} — ${{ github.workflow }} #${{ github.run_number }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Summary
        run: |
          echo "## Plan complete" >> "$GITHUB_STEP_SUMMARY"
          echo "What-if ran against resource group: ${{ vars.AZURE_RESOURCE_GROUP_STAGING }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Review the PR comment or job log for the full diff." >> "$GITHUB_STEP_SUMMARY"
